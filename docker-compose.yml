services:
  resume-rag-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-rag-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - PYTHONPATH=/app
      - ANONYMIZED_TELEMETRY=False
    restart: unless-stopped
